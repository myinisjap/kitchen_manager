name: kitchen_manager

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file: ../.env
    volumes:
      - kitchen_data:/data
    restart: unless-stopped

  splash:
    image: scrapinghub/splash
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - app

volumes:
  kitchen_data:
  caddy_data:
  caddy_config:
