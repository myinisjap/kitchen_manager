<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kitchen Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .tab-bar { padding-bottom: env(safe-area-inset-bottom); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="app()" x-cloak>

  <!-- Header -->
  <header class="bg-green-700 text-white px-4 py-3 flex items-center justify-between sticky top-0 z-10">
    <h1 class="text-lg font-bold">🍽 Kitchen Manager</h1>
    <span class="text-sm opacity-75" x-text="activeTab"></span>
  </header>

  <!-- Main content -->
  <main class="pb-20 max-w-2xl mx-auto px-4">

    <!-- ===== INVENTORY TAB ===== -->
    <section x-show="activeTab === 'inventory'">
      <div class="flex flex-wrap gap-2 my-4">
        <input x-model="inventorySearch" @input.debounce.300ms="fetchInventory()" type="text" placeholder="Search items..." class="flex-1 min-w-0 border rounded-lg px-3 py-2 text-sm" />
        <select x-model="inventoryLocation" @change="fetchInventory()" class="border rounded-lg px-3 py-2 text-sm">
          <option value="">All Locations</option>
          <template x-for="loc in locations">
            <option :value="loc" x-text="loc"></option>
          </template>
        </select>
        <button @click="openScanner('find')" class="border border-gray-300 text-gray-600 px-3 py-2 rounded-lg text-sm font-medium">📷 Scan</button>
        <button @click="openAddItem()" class="bg-green-600 text-white px-3 py-2 rounded-lg text-sm font-medium">+ Add Item</button>
      </div>

      <!-- Expiring soon banner -->
      <template x-if="expiringItems.length > 0">
        <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-3 mb-4 text-sm text-yellow-800">
          ⚠️ <strong x-text="expiringItems.length"></strong> items expiring within 7 days
        </div>
      </template>

      <!-- Item list -->
      <div class="space-y-2">
        <template x-for="item in inventoryItems" :key="item.id">
          <div class="bg-white rounded-xl shadow-sm border p-3 flex items-start justify-between">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2">
                <span class="font-medium text-gray-900 truncate" x-text="item.name"></span>
                <template x-if="item.quantity <= item.low_threshold">
                  <span class="text-xs bg-red-100 text-red-700 px-1.5 py-0.5 rounded">Low</span>
                </template>
              </div>
              <div class="text-sm text-gray-500 mt-0.5">
                <span x-text="item.quantity"></span> <span x-text="item.unit"></span>
                &bull; <span x-text="item.location || 'No location'"></span>
                <template x-if="item.expiration_date">
                  <span> &bull; Exp: <span x-text="item.expiration_date"></span></span>
                </template>
              </div>
            </div>
            <div class="flex gap-2 ml-2">
              <button @click="editItem(item)" class="text-blue-600 text-sm font-medium">Edit</button>
              <button @click="deleteItem(item.id)" class="text-red-500 text-sm">✕</button>
            </div>
          </div>
        </template>
        <template x-if="inventoryItems.length === 0">
          <p class="text-center text-gray-400 py-8">No items found. Add some!</p>
        </template>
      </div>
    </section>

    <!-- ===== SHOPPING TAB ===== -->
    <section x-show="activeTab === 'shopping'">
      <div class="flex gap-2 my-4">
        <button @click="generateFromThresholds()" class="flex-1 bg-blue-600 text-white rounded-lg px-3 py-2 text-sm font-medium">
          ↻ Auto-generate from low stock
        </button>
        <button @click="openGroceryScanner()" class="bg-purple-600 text-white rounded-lg px-3 py-2 text-sm font-medium">📷 Scan Groceries</button>
        <button @click="openAddShoppingItem()" class="bg-green-600 text-white rounded-lg px-3 py-2 text-sm font-medium">+ Add</button>
      </div>
      <button @click="clearCheckedItems()" class="mb-4 text-sm text-red-500 underline w-full text-center">
        Clear checked items
      </button>

      <div class="space-y-2">
        <template x-for="item in shoppingItems" :key="item.id">
          <div class="bg-white rounded-xl shadow-sm border p-3 flex items-center gap-3"
               :class="item.checked ? 'opacity-50' : ''">
            <input type="checkbox" :checked="item.checked"
                   @change="toggleShoppingItem(item)"
                   class="w-5 h-5 accent-green-600 flex-shrink-0" />
            <div class="flex-1 min-w-0">
              <span class="font-medium" :class="item.checked ? 'line-through' : ''" x-text="item.name"></span>
              <div class="text-sm text-gray-500">
                <span x-text="item.quantity_needed"></span> <span x-text="item.unit"></span>
                <span class="ml-1 text-xs text-gray-400" x-text="'(' + item.source + ')'"></span>
              </div>
            </div>
            <button @click="deleteShoppingItem(item.id)" class="text-red-400 text-sm">✕</button>
          </div>
        </template>
        <template x-if="shoppingItems.length === 0">
          <p class="text-center text-gray-400 py-8">Shopping list is empty!</p>
        </template>
      </div>
    </section>

    <!-- ===== RECIPES TAB ===== -->
    <section x-show="activeTab === 'recipes'">
      <div class="flex gap-2 my-4">
        <input x-model="recipeTagFilter" @input.debounce.300ms="fetchRecipes()" type="text" placeholder="Filter by tag..." class="flex-1 border rounded-lg px-3 py-2 text-sm" />
        <label class="flex items-center gap-1 text-sm text-gray-600 whitespace-nowrap">
          <input type="checkbox" x-model="recipeAvailableOnly" @change="fetchRecipes()" class="accent-green-600" />
          Have ingredients
        </label>
        <button @click="openAddRecipe()" class="bg-green-600 text-white rounded-lg px-3 py-2 text-sm font-medium">+ Add</button>
      </div>

      <div class="space-y-3">
        <template x-for="recipe in recipes" :key="recipe.id">
          <div class="bg-white rounded-xl shadow-sm border p-4">
            <div class="flex items-start justify-between">
              <div>
                <h3 class="font-semibold text-gray-900" x-text="recipe.name"></h3>
                <p class="text-sm text-gray-500 mt-0.5" x-text="recipe.description || ''"></p>
                <template x-if="recipe.tags">
                  <div class="flex flex-wrap gap-1 mt-1">
                    <template x-for="tag in (recipe.tags || '').split(',')" :key="tag">
                      <span class="text-xs bg-green-100 text-green-700 px-1.5 py-0.5 rounded" x-text="tag.trim()"></span>
                    </template>
                  </div>
                </template>
              </div>
              <div class="flex gap-2 ml-2">
                <button @click="viewRecipe(recipe)" class="text-blue-600 text-sm">View</button>
                <button @click="deleteRecipe(recipe.id)" class="text-red-400 text-sm">✕</button>
              </div>
            </div>
          </div>
        </template>
        <template x-if="recipes.length === 0">
          <p class="text-center text-gray-400 py-8">No recipes found.</p>
        </template>
      </div>
    </section>

    <!-- ===== CALENDAR TAB ===== -->
    <section x-show="activeTab === 'calendar'">
      <div class="flex items-center gap-2 my-4">
        <button @click="prevWeek()" class="bg-white border rounded-lg px-3 py-2 text-sm">←</button>
        <span class="flex-1 text-center text-sm font-medium text-gray-700"
              x-text="calendarWeekLabel"></span>
        <button @click="nextWeek()" class="bg-white border rounded-lg px-3 py-2 text-sm">→</button>
      </div>
      <button @click="generateWeeklyShopping()" class="mb-4 w-full bg-blue-600 text-white rounded-lg px-3 py-2 text-sm font-medium">
        ↻ Generate weekly shopping list
      </button>

      <div class="space-y-3">
        <template x-for="day in calendarDays" :key="day.date">
          <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
            <div class="bg-gray-100 px-3 py-2 text-sm font-semibold text-gray-700"
                 x-text="day.label"></div>
            <div class="p-3 space-y-2">
              <template x-for="slot in ['breakfast','lunch','dinner']" :key="slot">
                <div class="flex items-center gap-2">
                  <span class="text-xs text-gray-400 w-16 capitalize" x-text="slot"></span>
                  <template x-if="getCalendarEntry(day.date, slot)">
                    <div class="flex-1 flex items-center justify-between bg-green-50 rounded-lg px-2 py-1">
                      <span class="text-sm text-green-800"
                            x-text="getRecipeName(getCalendarEntry(day.date, slot).recipe_id)"></span>
                      <button @click="deleteCalendarEntry(getCalendarEntry(day.date, slot).id)"
                              class="text-red-400 text-xs ml-2">✕</button>
                    </div>
                  </template>
                  <template x-if="!getCalendarEntry(day.date, slot)">
                    <button @click="openAddCalendarEntry(day.date, slot)"
                            class="flex-1 border border-dashed border-gray-300 rounded-lg px-2 py-1 text-xs text-gray-400 text-left hover:border-green-400">
                      + Add meal
                    </button>
                  </template>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </section>

  </main>

  <!-- Tab Bar -->
  <nav class="tab-bar fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around py-2 z-10">
    <template x-for="tab in tabs" :key="tab.id">
      <button @click="switchTab(tab.id)"
              class="flex flex-col items-center gap-0.5 px-4 py-1"
              :class="activeTab === tab.id ? 'text-green-600' : 'text-gray-400'">
        <span class="text-xl" x-text="tab.icon"></span>
        <span class="text-xs font-medium" x-text="tab.label"></span>
      </button>
    </template>
  </nav>

  <!-- ===== MODALS ===== -->

  <!-- Add/Edit Inventory Item Modal -->
  <div x-show="modal === 'item'" class="fixed inset-0 bg-black/50 z-20 flex items-end justify-center sm:items-center">
    <div class="bg-white rounded-t-2xl sm:rounded-2xl w-full max-w-lg p-6 space-y-4 max-h-[90vh] overflow-y-auto">
      <h2 class="text-lg font-bold" x-text="editingItem ? 'Edit Item' : 'Add Item'"></h2>
      <div class="relative">
        <input x-model="itemForm.name"
               @input="clearTimeout(_suggestionTimer); _suggestionTimer = setTimeout(() => fetchSuggestions(), 250)"
               @keydown.escape="showSuggestions = false"
               @blur="setTimeout(() => showSuggestions = false, 150)"
               placeholder="Name *"
               class="w-full border rounded-lg px-3 py-2 text-sm"
               autocomplete="off" />
        <div x-show="showSuggestions && suggestions.length"
             class="absolute z-30 left-0 right-0 top-full mt-1 bg-white border border-gray-200 rounded-lg shadow-lg overflow-hidden">
          <template x-for="s in suggestions" :key="s.name">
            <div @click="selectSuggestion(s)"
                 class="flex items-center justify-between px-3 py-2 text-sm cursor-pointer hover:bg-blue-50">
              <span x-text="s.name" class="font-medium"></span>
              <span x-text="s.location + ' · ' + s.unit" class="text-xs text-gray-400 ml-2"></span>
            </div>
          </template>
        </div>
      </div>
      <div class="flex gap-2">
        <input x-model.number="itemForm.quantity" type="number" placeholder="Quantity" class="flex-1 border rounded-lg px-3 py-2 text-sm" />
        <select x-model="itemForm.unit" class="flex-1 border rounded-lg px-3 py-2 text-sm">
          <option value="">Unit</option>
          <template x-for="dim in ['mass','volume','count']" :key="dim">
            <optgroup :label="dim">
              <template x-for="u in (unitGroups[dim] || [])" :key="u">
                <option :value="u" x-text="u"></option>
              </template>
            </optgroup>
          </template>
        </select>
      </div>
      <div class="flex gap-2 items-center">
        <label class="text-sm text-gray-600 whitespace-nowrap">Preferred unit:</label>
        <select x-model="itemForm.preferred_unit" class="flex-1 border rounded-lg px-3 py-2 text-sm">
          <option value="">Same as unit</option>
          <template x-for="dim in ['mass','volume','count']" :key="dim">
            <optgroup :label="dim">
              <template x-for="u in (unitGroups[dim] || [])" :key="u">
                <option :value="u" x-text="u"></option>
              </template>
            </optgroup>
          </template>
        </select>
      </div>
      <input x-model="itemForm.location" placeholder="Location (fridge, pantry...)" class="w-full border rounded-lg px-3 py-2 text-sm" />
      <input x-model="itemForm.expiration_date" type="date" class="w-full border rounded-lg px-3 py-2 text-sm" />
      <div class="flex gap-2">
        <label class="text-sm text-gray-600 self-center">Low threshold:</label>
        <input x-model.number="itemForm.low_threshold" type="number" class="flex-1 border rounded-lg px-3 py-2 text-sm" />
      </div>
      <div class="flex gap-2 items-center">
        <input x-model="itemForm.barcode"
               placeholder="Barcode"
               class="flex-1 border rounded-lg px-3 py-2 text-sm"
               autocomplete="off" />
        <button @click="openScanner('fill')"
                type="button"
                class="border rounded-lg px-3 py-2 text-sm text-gray-600 hover:bg-gray-50"
                title="Scan barcode">
          📷
        </button>
      </div>
      <div class="flex gap-2 pt-2">
        <button @click="modal = null" class="flex-1 border rounded-lg py-2 text-sm">Cancel</button>
        <button @click="saveItem()" class="flex-1 bg-green-600 text-white rounded-lg py-2 text-sm font-medium">Save</button>
      </div>
    </div>
  </div>

  <!-- Grocery Scanner Modal -->
  <div x-show="groceryScanOpen" class="fixed inset-0 bg-black z-50 flex flex-col">
    <!-- Header -->
    <div class="flex items-center justify-between p-4">
      <div class="flex items-center gap-3">
        <span class="text-white text-sm font-medium">Scan Groceries</span>
        <span x-show="groceryScanCount > 0"
              class="bg-white/20 text-white text-xs px-2 py-0.5 rounded-full"
              x-text="groceryScanCount + ' scanned'"></span>
      </div>
      <button @click="closeGroceryScanner()" class="text-white text-sm border border-white/40 rounded-lg px-3 py-1.5">Done</button>
    </div>

    <!-- Camera -->
    <div class="relative overflow-hidden" :class="groceryScanPaused ? 'h-48' : 'flex-1'">
      <video id="grocery-scanner-video" class="absolute inset-0 w-full h-full object-cover" playsinline x-show="!groceryCameraError"></video>
      <div x-show="groceryCameraError" class="absolute inset-0 flex items-center justify-center bg-black">
        <p class="text-red-400 text-sm text-center px-6" x-text="groceryCameraError"></p>
      </div>
      <div x-show="!groceryScanPaused && !groceryCameraError" class="absolute inset-0 flex items-center justify-center pointer-events-none">
        <div class="w-64 h-40 border-2 border-white/70 rounded-lg"></div>
      </div>
      <div x-show="groceryScanPaused" class="absolute inset-0 bg-black/60 flex items-center justify-center">
        <span class="text-white text-sm">Scanner paused</span>
      </div>
    </div>

    <!-- New item form (shown when paused for unknown barcode) -->
    <div x-show="groceryScanPaused && groceryNewItem !== null" class="flex-1 overflow-y-auto bg-white p-4">
      <h3 class="font-semibold text-gray-800 mb-3">New Item — Add to Inventory</h3>
      <div class="space-y-3">
        <div>
          <label class="block text-xs text-gray-500 mb-1">Name</label>
          <input x-model="groceryItemForm.name" type="text" placeholder="Item name"
                 class="w-full border rounded-lg px-3 py-2 text-sm" />
        </div>
        <div class="flex gap-2">
          <div class="flex-1">
            <label class="block text-xs text-gray-500 mb-1">Quantity</label>
            <input x-model.number="groceryItemForm.quantity" type="number" min="0" step="any"
                   class="w-full border rounded-lg px-3 py-2 text-sm" />
          </div>
          <div class="flex-1">
            <label class="block text-xs text-gray-500 mb-1">Unit</label>
            <select x-model="groceryItemForm.unit" class="w-full border rounded-lg px-3 py-2 text-sm">
              <option value="">—</option>
              <template x-for="dim in ['mass','volume','count']" :key="dim">
                <optgroup :label="dim">
                  <template x-for="u in (unitGroups[dim] || [])" :key="u">
                    <option :value="u" x-text="u"></option>
                  </template>
                </optgroup>
              </template>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">Location</label>
          <input x-model="groceryItemForm.location" type="text" placeholder="e.g. Pantry, Fridge"
                 class="w-full border rounded-lg px-3 py-2 text-sm" />
        </div>
        <div>
          <label class="block text-xs text-gray-500 mb-1">Expiry (optional)</label>
          <input x-model="groceryItemForm.expiration_date" type="date"
                 class="w-full border rounded-lg px-3 py-2 text-sm" />
        </div>
      </div>
      <div class="flex gap-2 mt-4">
        <button @click="confirmGroceryNewItem()"
                class="flex-1 bg-green-600 text-white rounded-lg px-4 py-2 text-sm font-medium">
          Add to Inventory
        </button>
        <button @click="skipGroceryNewItem()"
                class="flex-1 border border-gray-300 text-gray-600 rounded-lg px-4 py-2 text-sm font-medium">
          Skip
        </button>
      </div>
    </div>
  </div>

  <!-- Scanner Modal -->
  <div x-show="scannerOpen" class="fixed inset-0 bg-black z-50 flex flex-col">
    <div class="flex items-center justify-between p-4">
      <span class="text-white text-sm font-medium">
        <span x-text="scannerMode === 'find' ? 'Scan to find item' : 'Scan barcode'"></span>
      </span>
      <button @click="closeScanner()" class="text-white text-sm border border-white/40 rounded-lg px-3 py-1.5">Cancel</button>
    </div>
    <div class="flex-1 relative overflow-hidden">
      <video id="scanner-video" class="absolute inset-0 w-full h-full object-cover" playsinline></video>
      <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
        <div class="w-64 h-40 border-2 border-white/70 rounded-lg"></div>
      </div>
    </div>
    <div class="p-4 text-center">
      <p class="text-white/70 text-sm">Point camera at a barcode</p>
    </div>
  </div>

  <!-- Add Shopping Item Modal -->
  <div x-show="modal === 'shopping'" class="fixed inset-0 bg-black/50 z-20 flex items-end justify-center sm:items-center">
    <div class="bg-white rounded-t-2xl sm:rounded-2xl w-full max-w-lg p-6 space-y-4">
      <h2 class="text-lg font-bold">Add Shopping Item</h2>
      <input x-model="shoppingForm.name" placeholder="Item name *" class="w-full border rounded-lg px-3 py-2 text-sm" />
      <div class="flex gap-2">
        <input x-model.number="shoppingForm.quantity_needed" type="number" placeholder="Qty" class="flex-1 border rounded-lg px-3 py-2 text-sm" />
        <select x-model="shoppingForm.unit" class="flex-1 border rounded-lg px-3 py-2 text-sm">
          <option value="">Unit</option>
          <template x-for="dim in ['mass','volume','count']" :key="dim">
            <optgroup :label="dim">
              <template x-for="u in (unitGroups[dim] || [])" :key="u">
                <option :value="u" x-text="u"></option>
              </template>
            </optgroup>
          </template>
        </select>
      </div>
      <div class="flex gap-2 pt-2">
        <button @click="modal = null" class="flex-1 border rounded-lg py-2 text-sm">Cancel</button>
        <button @click="saveShoppingItem()" class="flex-1 bg-green-600 text-white rounded-lg py-2 text-sm font-medium">Save</button>
      </div>
    </div>
  </div>

  <!-- Add Recipe Modal -->
  <div x-show="modal === 'recipe'" class="fixed inset-0 bg-black/50 z-20 flex items-end justify-center sm:items-center">
    <div class="bg-white rounded-t-2xl sm:rounded-2xl w-full max-w-lg p-6 space-y-4 max-h-[90vh] overflow-y-auto">
      <h2 class="text-lg font-bold">Add Recipe</h2>
      <input x-model="recipeForm.name" placeholder="Recipe name *" class="w-full border rounded-lg px-3 py-2 text-sm" />
      <input x-model="recipeForm.description" placeholder="Short description" class="w-full border rounded-lg px-3 py-2 text-sm" />
      <textarea x-model="recipeForm.instructions" placeholder="Instructions" rows="3" class="w-full border rounded-lg px-3 py-2 text-sm"></textarea>
      <input x-model="recipeForm.tags" placeholder="Tags (comma-separated: breakfast,quick)" class="w-full border rounded-lg px-3 py-2 text-sm" />
      <input x-model.number="recipeForm.servings" type="number" placeholder="Servings" class="w-full border rounded-lg px-3 py-2 text-sm" />

      <h3 class="font-semibold text-sm text-gray-700">Ingredients</h3>
      <template x-for="(ing, idx) in recipeForm.ingredients" :key="idx">
        <div class="flex gap-1">
          <input x-model="ing.name" placeholder="Ingredient" class="flex-1 border rounded-lg px-2 py-1.5 text-sm" />
          <input x-model.number="ing.quantity" type="number" placeholder="Qty" class="w-16 border rounded-lg px-2 py-1.5 text-sm" />
          <select x-model="ing.unit" class="w-24 border rounded-lg px-2 py-1.5 text-sm">
            <option value="">Unit</option>
            <template x-for="dim in ['mass','volume','count']" :key="dim">
              <optgroup :label="dim">
                <template x-for="u in (unitGroups[dim] || [])" :key="u">
                  <option :value="u" x-text="u"></option>
                </template>
              </optgroup>
            </template>
          </select>
          <button @click="recipeForm.ingredients.splice(idx, 1)" class="text-red-400 text-sm px-1">✕</button>
        </div>
      </template>
      <button @click="recipeForm.ingredients.push({name:'',quantity:1,unit:'',inventory_id:null})"
              class="text-sm text-blue-600 underline">+ Add ingredient</button>

      <div class="flex gap-2 pt-2">
        <button @click="modal = null" class="flex-1 border rounded-lg py-2 text-sm">Cancel</button>
        <button @click="saveRecipe()" class="flex-1 bg-green-600 text-white rounded-lg py-2 text-sm font-medium">Save</button>
      </div>
    </div>
  </div>

  <!-- View Recipe Modal -->
  <div x-show="modal === 'viewRecipe'" class="fixed inset-0 bg-black/50 z-20 flex items-end justify-center sm:items-center">
    <div class="bg-white rounded-t-2xl sm:rounded-2xl w-full max-w-lg p-6 space-y-3 max-h-[90vh] overflow-y-auto" x-show="selectedRecipe">
      <h2 class="text-lg font-bold" x-text="selectedRecipe?.name"></h2>
      <p class="text-sm text-gray-500" x-text="selectedRecipe?.description"></p>
      <template x-if="selectedRecipe?.tags">
        <div class="flex flex-wrap gap-1">
          <template x-for="tag in (selectedRecipe?.tags || '').split(',')" :key="tag">
            <span class="text-xs bg-green-100 text-green-700 px-1.5 py-0.5 rounded" x-text="tag.trim()"></span>
          </template>
        </div>
      </template>
      <div>
        <h3 class="font-semibold text-sm mb-1">Ingredients</h3>
        <ul class="space-y-1">
          <template x-for="ing in selectedRecipe?.ingredients" :key="ing.id">
            <li class="text-sm text-gray-700">
              • <span x-text="ing.quantity"></span> <span x-text="ing.unit"></span> <span x-text="ing.name"></span>
            </li>
          </template>
        </ul>
      </div>
      <template x-if="selectedRecipe?.instructions">
        <div>
          <h3 class="font-semibold text-sm mb-1">Instructions</h3>
          <p class="text-sm text-gray-700 whitespace-pre-wrap" x-text="selectedRecipe?.instructions"></p>
        </div>
      </template>
      <div class="flex gap-2 pt-2">
        <button @click="modal = null" class="flex-1 border rounded-lg py-2 text-sm">Close</button>
        <button @click="addRecipeToShoppingList(selectedRecipe)" class="flex-1 bg-blue-600 text-white rounded-lg py-2 text-sm font-medium">
          + Missing items to shopping list
        </button>
      </div>
    </div>
  </div>

  <!-- Add Calendar Entry Modal -->
  <div x-show="modal === 'calendarEntry'" class="fixed inset-0 bg-black/50 z-20 flex items-end justify-center sm:items-center">
    <div class="bg-white rounded-t-2xl sm:rounded-2xl w-full max-w-lg p-6 space-y-4">
      <h2 class="text-lg font-bold">Add Meal</h2>
      <p class="text-sm text-gray-500">
        <span x-text="calendarEntryForm.date"></span> — <span x-text="calendarEntryForm.meal_slot" class="capitalize"></span>
      </p>
      <select x-model.number="calendarEntryForm.recipe_id" class="w-full border rounded-lg px-3 py-2 text-sm">
        <option value="">Select a recipe...</option>
        <template x-for="recipe in recipes" :key="recipe.id">
          <option :value="recipe.id" x-text="recipe.name"></option>
        </template>
      </select>
      <div class="flex gap-2 items-center">
        <label class="text-sm text-gray-600">Servings:</label>
        <input x-model.number="calendarEntryForm.servings" type="number" min="1" class="flex-1 border rounded-lg px-3 py-2 text-sm" />
      </div>
      <div class="flex gap-2 pt-2">
        <button @click="modal = null" class="flex-1 border rounded-lg py-2 text-sm">Cancel</button>
        <button @click="saveCalendarEntry()" class="flex-1 bg-green-600 text-white rounded-lg py-2 text-sm font-medium">Save</button>
      </div>
    </div>
  </div>

  <!-- Tailwind safelist: keeps dynamically-applied classes from being purged -->
  <div class="hidden bg-green-600 bg-red-600"></div>

  <!-- Toast notification -->
  <div x-show="toast" x-transition
       :class="{
         'bg-green-600': toastStyle === 'success',
         'bg-red-600':   toastStyle === 'error',
         'bg-gray-900':  toastStyle === ''
       }"
       class="fixed top-28 left-1/2 -translate-x-1/2 text-white text-sm px-4 py-2 rounded-full z-50 shadow-lg flex items-center gap-2">
    <span x-show="toastStyle === 'success'">✓</span>
    <span x-show="toastStyle === 'error'">✕</span>
    <span x-text="toast"></span>
    <span x-show="toastStyle === 'success' && toastBadge"
          x-text="toastBadge"
          class="bg-white/20 rounded-full px-2 py-0.5 text-xs font-semibold ml-1"></span>
  </div>

  <script>
    function app() {
      return {
        // State
        activeTab: 'inventory',
        tabs: [
          { id: 'inventory', label: 'Pantry', icon: '🥫' },
          { id: 'shopping', label: 'Shopping', icon: '🛒' },
          { id: 'recipes', label: 'Recipes', icon: '📖' },
          { id: 'calendar', label: 'Calendar', icon: '📅' },
        ],
        modal: null,
        toast: '',
        _toastTimer: null,
        toastStyle: '',
        toastBadge: '',

        // Inventory
        inventoryItems: [],
        expiringItems: [],
        inventorySearch: '',
        inventoryLocation: '',
        locations: [],
        editingItem: null,
        unitGroups: {},
        suggestions: [],
        showSuggestions: false,
        _suggestionTimer: null,
        scannerOpen: false,
        scannerMode: '',
        _codeReader: null,
        _stream: null,
        _scannerActive: false,
        _scanRaf: null,
        groceryScanOpen: false,
        groceryScanCount: 0,
        groceryScanPaused: false,
        _groceryProcessing: false,
        groceryNewItem: null, // prefill object when paused for unknown item
        groceryCameraError: '',
        groceryItemForm: { name: '', quantity: 1, unit: '', preferred_unit: '', location: '', expiration_date: '', low_threshold: 1, barcode: '' },
        itemForm: { name: '', quantity: 0, unit: '', preferred_unit: '', location: '', expiration_date: '', low_threshold: 1, barcode: '' },

        // Shopping
        shoppingItems: [],
        shoppingForm: { name: '', quantity_needed: 1, unit: '' },

        // Recipes
        recipes: [],
        recipeTagFilter: '',
        recipeAvailableOnly: false,
        selectedRecipe: null,
        recipeForm: { name: '', description: '', instructions: '', tags: '', servings: 2, ingredients: [] },

        // Calendar
        calendarEntries: [],
        calendarWeekStart: null,
        calendarEntryForm: { date: '', meal_slot: 'dinner', recipe_id: '', servings: 1 },

        async init() {
          this.calendarWeekStart = this.getMonday(new Date());
          await this.fetchInventory();
          await this.fetchExpiring();
          await this.fetchShoppingList();
          await this.fetchRecipes();
          await this.fetchCalendar();
          const uRes = await fetch('/api/units');
          this.unitGroups = await uRes.json();
          const sRes = await fetch('/api/inventory/suggestions');
          const allItems = await sRes.json();
          this.locations = [...new Set(allItems.map(i => i.location).filter(Boolean))];
        },

        async switchTab(tab) {
          this.activeTab = tab;
          if (tab === 'inventory') { await this.fetchInventory(); await this.fetchExpiring(); }
          if (tab === 'shopping') await this.fetchShoppingList();
          if (tab === 'recipes') await this.fetchRecipes();
          if (tab === 'calendar') await this.fetchCalendar();
        },

        async fetchSuggestions() {
          const q = this.itemForm.name;
          if (!q) { this.suggestions = []; this.showSuggestions = false; return; }
          try {
            const res = await fetch('/api/inventory/suggestions?q=' + encodeURIComponent(q));
            if (!res.ok) { this.suggestions = []; this.showSuggestions = false; return; }
            this.suggestions = await res.json();
            this.showSuggestions = this.suggestions.length > 0;
          } catch {
            this.suggestions = [];
            this.showSuggestions = false;
          }
        },

        selectSuggestion(s) {
          this.itemForm.name = s.name;
          this.itemForm.unit = s.unit;
          this.itemForm.preferred_unit = s.preferred_unit;
          this.itemForm.location = s.location;
          this.itemForm.low_threshold = s.low_threshold;
          this.showSuggestions = false;
        },

        async openScanner(mode) {
          if (this._scannerActive) { this.closeScanner(); }
          this.scannerMode = mode;
          this.scannerOpen = true;
          await this.$nextTick();
          if (!this.scannerOpen) return;

          const video = document.getElementById('scanner-video');
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }
            });
            if (!this.scannerOpen) { stream.getTracks().forEach(t => t.stop()); return; }
            this._stream = stream;
            video.srcObject = stream;
            await video.play();
            await new Promise(resolve => {
              if (video.readyState >= 2) { resolve(); return; }
              video.addEventListener('canplay', resolve, { once: true });
            });
          } catch (err) {
            this.closeScanner();
            const msg = (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError')
              ? 'Camera access denied — enter barcode manually'
              : 'Camera unavailable — enter barcode manually';
            this.showToast(msg);
            return;
          }

          this._scannerActive = true;

          if (typeof BarcodeDetector !== 'undefined') {
            const detector = new BarcodeDetector({ formats: ['ean_13','ean_8','upc_a','upc_e','code_128','code_39','qr_code','itf','codabar'] });
            const scan = async () => {
              if (!this._scannerActive) return;
              try {
                const codes = await detector.detect(video);
                if (codes.length > 0) { this.onBarcodeScanned(codes[0].rawValue); return; }
              } catch {}
              this._scanRaf = requestAnimationFrame(scan);
            };
            this._scanRaf = requestAnimationFrame(scan);
          } else {
            this._codeReader = new ZXing.BrowserMultiFormatReader();
            this._codeReader.decodeFromVideoElementContinuously(video, (result, err) => {
              if (result) this.onBarcodeScanned(result.getText());
            });
          }
        },

        closeScanner() {
          this._scannerActive = false;
          if (this._scanRaf) { cancelAnimationFrame(this._scanRaf); this._scanRaf = null; }
          if (this._codeReader) { this._codeReader.reset(); this._codeReader = null; }
          if (this._stream) { this._stream.getTracks().forEach(t => t.stop()); this._stream = null; }
          this.scannerOpen = false;
          this.scannerMode = '';
        },

        async onBarcodeScanned(code) {
          if (!this.scannerOpen) return; // guard against duplicate ZXing callbacks
          const mode = this.scannerMode;
          this.closeScanner();
          if (mode === 'fill') {
            this.itemForm.barcode = code;
            return;
          }
          // mode === 'find': look up in our inventory first
          try {
            const res = await fetch('/api/inventory/barcode/' + encodeURIComponent(code));
            if (res.ok) {
              const item = await res.json();
              this.editItem(item);
              return;
            }
          } catch {
            // fall through to Open Food Facts
          }
          // Not in inventory — try Open Food Facts
          let prefill = { barcode: code };
          try {
            const off = await fetch('https://world.openfoodfacts.org/api/v2/product/' + encodeURIComponent(code) + '.json');
            if (off.ok) {
              const data = await off.json();
              if (data.status === 1 && data.product) {
                const p = data.product;
                if (p.product_name) prefill.name = p.product_name;

                const parsed = this.parseOffQuantity(p);
                if (parsed) {
                  prefill.quantity = parsed.qty;
                  prefill.unit = parsed.unit;
                  prefill.preferred_unit = parsed.unit;
                }
              }
            }
          } catch {
            // silent fallback — open form with just barcode
          }
          this.openAddItem();
          Object.assign(this.itemForm, prefill);
        },

        parseOffQuantity(product) {
          const offUnitMap = {
            'g': 'g', 'gram': 'g', 'grams': 'g',
            'kg': 'kg', 'kilogram': 'kg', 'kilograms': 'kg',
            'oz': 'oz', 'ounce': 'oz', 'ounces': 'oz',
            'lb': 'lb', 'lbs': 'lb', 'pound': 'lb', 'pounds': 'lb',
            'ml': 'ml', 'milliliter': 'ml', 'milliliters': 'ml', 'millilitre': 'ml',
            'l': 'L', 'L': 'L', 'liter': 'L', 'liters': 'L', 'litre': 'L', 'litres': 'L',
            'cl': 'ml',
          };
          let qty = null, unit = null;
          if (product.product_quantity && product.product_quantity_unit) {
            const rawUnit = product.product_quantity_unit.trim().toLowerCase();
            const mapped = offUnitMap[rawUnit] || offUnitMap[product.product_quantity_unit.trim()];
            if (mapped) {
              qty = parseFloat(product.product_quantity);
              unit = mapped;
              if (rawUnit === 'cl') qty = qty * 10;
            }
          }
          if ((qty === null || unit === null) && product.quantity) {
            const m = product.quantity.trim().match(/^([\d.,]+)\s*([a-zA-Z]+)/);
            if (m) {
              const rawUnit = m[2].trim().toLowerCase();
              const mapped = offUnitMap[rawUnit] || offUnitMap[m[2].trim()];
              if (mapped) {
                qty = parseFloat(m[1].replace(',', '.'));
                unit = mapped;
                if (rawUnit === 'cl') qty = qty * 10;
              }
            }
          }
          return (qty !== null && unit !== null && !isNaN(qty)) ? { qty, unit } : null;
        },

        unitDimension(unit) {
          const dims = {
            g: 'mass', kg: 'mass', oz: 'mass', lb: 'mass',
            ml: 'volume', L: 'volume', cup: 'volume', tbsp: 'volume', tsp: 'volume',
            piece: 'count', clove: 'count', can: 'count', jar: 'count', bunch: 'count',
          };
          return dims[unit] || null;
        },

        convertUnits(qty, fromUnit, toUnit) {
          if (fromUnit === toUnit) return qty;
          const toBaseG = { g: 1, kg: 1000, oz: 28.3495, lb: 453.592 };
          const toBaseML = { ml: 1, L: 1000, cup: 236.588, tbsp: 14.787, tsp: 4.929 };
          const dimFrom = this.unitDimension(fromUnit);
          const dimTo = this.unitDimension(toUnit);
          if (!dimFrom || dimFrom !== dimTo || dimFrom === 'count') return null;
          if (dimFrom === 'mass') return qty * toBaseG[fromUnit] / toBaseG[toUnit];
          if (dimFrom === 'volume') return qty * toBaseML[fromUnit] / toBaseML[toUnit];
          return null;
        },

        async openGroceryScanner() {
          if (this._scannerActive) this.closeScanner();
          this.groceryScanOpen = true;
          this.groceryScanCount = 0;
          this.groceryScanPaused = false;
          this._groceryProcessing = false;
          this.groceryNewItem = null;
          this.groceryCameraError = '';
          await this.$nextTick();
          await this._startGroceryCamera();
        },

        async _startGroceryCamera() {
          if (!this.groceryScanOpen) return;
          const video = document.getElementById('grocery-scanner-video');
          try {
            const stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }
            });
            if (!this.groceryScanOpen) { stream.getTracks().forEach(t => t.stop()); return; }
            this._stream = stream;
            video.srcObject = stream;
            await new Promise(resolve => { video.onloadedmetadata = resolve; });
            video.play();
          } catch {
            this.groceryCameraError = 'Camera access denied. Please allow camera access and try again.';
            return;
          }

          this._scannerActive = true;
          let lastScanErrorToast = 0;

          if (typeof BarcodeDetector !== 'undefined') {
            const detector = new BarcodeDetector({ formats: ['ean_13','ean_8','upc_a','upc_e','code_128','code_39','qr_code','itf','codabar'] });
            const scan = async () => {
              if (!this._scannerActive || this.groceryScanPaused) {
                if (this._scannerActive) this._scanRaf = requestAnimationFrame(scan);
                return;
              }
              try {
                const codes = await detector.detect(video);
                if (codes.length > 0) { lastScanErrorToast = 0; this.onGroceryBarcodeScanned(codes[0].rawValue); return; }
              } catch {
                const now = Date.now();
                if (now - lastScanErrorToast > 2000) {
                  lastScanErrorToast = now;
                  this.showToast("Couldn't read barcode", 'error');
                }
              }
              this._scanRaf = requestAnimationFrame(scan);
            };
            this._scanRaf = requestAnimationFrame(scan);
          } else {
            this._codeReader = new ZXing.BrowserMultiFormatReader();
            this._codeReader.decodeFromVideoElementContinuously(video, (result, err) => {
              if (result && !this.groceryScanPaused) { lastScanErrorToast = 0; this.onGroceryBarcodeScanned(result.getText()); return; }
              if (err && !(err instanceof ZXing.NotFoundException)) {
                const now = Date.now();
                if (now - lastScanErrorToast > 2000) {
                  lastScanErrorToast = now;
                  this.showToast("Couldn't read barcode", 'error');
                }
              }
            });
          }
        },

        closeGroceryScanner() {
          this.groceryScanOpen = false;
          this.groceryScanPaused = false;
          this.groceryNewItem = null;
          this._scannerActive = false;
          if (this._scanRaf) { cancelAnimationFrame(this._scanRaf); this._scanRaf = null; }
          if (this._codeReader) { this._codeReader.reset(); this._codeReader = null; }
          if (this._stream) { this._stream.getTracks().forEach(t => t.stop()); this._stream = null; }
        },

        async onGroceryBarcodeScanned(code) {
          if (!this.groceryScanOpen || this.groceryScanPaused || this._groceryProcessing) return;
          this._groceryProcessing = true;

          // Check inventory first
          try {
            const res = await fetch('/api/inventory/barcode/' + encodeURIComponent(code));
            if (res.ok) {
              const item = await res.json();
              // Determine increment amount from OFf
              let addQty = 1;
              let addUnit = item.unit;
              try {
                const offPromise = fetch('https://world.openfoodfacts.org/api/v2/product/' + encodeURIComponent(code) + '.json').then(r => r.json());
                const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 3000));
                let offData = null;
                try {
                  offData = await Promise.race([offPromise, timeoutPromise]);
                } catch { /* fallback to +1 */ }
                if (offData && offData.status === 1 && offData.product) {
                  const parsed = this.parseOffQuantity(offData.product);
                  if (parsed) {
                    const targetUnit = item.preferred_unit || item.unit;
                    const converted = this.convertUnits(parsed.qty, parsed.unit, targetUnit);
                    if (converted !== null) {
                      addQty = converted;
                      addUnit = targetUnit;
                    } else {
                      // dimension mismatch — fall back to +1 in item's unit
                      addQty = 1;
                      addUnit = item.unit;
                    }
                  }
                }
              } catch { /* silent — use +1 default */ }

              const newQty = parseFloat((item.quantity + addQty).toFixed(4));
              try {
                const patch = await fetch(`/api/inventory/${item.id}`, {
                  method: 'PATCH',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ quantity: newQty }),
                });
                if (patch.ok) {
                  this.groceryScanCount++;
                  const displayQty = Number.isInteger(addQty) ? addQty : parseFloat(addQty.toFixed(2));
                  const displayNew = Number.isInteger(newQty) ? newQty : parseFloat(newQty.toFixed(2));
                  this.showToast(`${item.name} +${displayQty} ${addUnit}`, 'success', `${displayNew} ${item.unit}`);
                  this.fetchInventory(); // background refresh, no await
                } else {
                  this.showToast(`Failed to update ${item.name}`, 'error');
                }
              } catch {
                this.showToast(`Failed to update ${item.name}`, 'error');
                this._groceryProcessing = false;
              }
              this._groceryProcessing = false;
              return;
            }
          } catch { /* fall through to new item flow */ }

          // Not in inventory — look up OFf and pause for confirmation
          this._groceryProcessing = false;
          this.groceryScanPaused = true;
          let prefill = { barcode: code, quantity: 1, unit: '', preferred_unit: '', location: '', expiration_date: '', low_threshold: 1 };

          try {
            const offPromise = fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json`).then(r => r.json());
            const offTimeout = new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 3000));
            let offData = null;
            try { offData = await Promise.race([offPromise, offTimeout]); } catch { /* silent fallback */ }
            if (offData && offData.status === 1 && offData.product) {
              const p = offData.product;
              if (p.product_name) prefill.name = p.product_name;
              const parsed = this.parseOffQuantity(p);
              if (parsed) {
                prefill.quantity = parsed.qty;
                prefill.unit = parsed.unit;
                prefill.preferred_unit = parsed.unit;
              }
            }
          } catch { /* silent */ }

          // Try to pre-fill location from existing inventory item with same name
          if (prefill.name) {
            try {
              const inv = await fetch('/api/inventory/?name=' + encodeURIComponent(prefill.name));
              if (inv.ok) {
                const items = await inv.json();
                if (items.length > 0 && items[0].location) prefill.location = items[0].location;
              }
            } catch { /* silent */ }
          }

          this.groceryNewItem = prefill;
          this.groceryItemForm = { name: prefill.name || '', quantity: prefill.quantity, unit: prefill.unit, preferred_unit: prefill.preferred_unit, location: prefill.location, expiration_date: '', low_threshold: 1, barcode: code };
        },

        async confirmGroceryNewItem() {
          try {
            const res = await fetch('/api/inventory/', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.groceryItemForm),
            });
            if (res.ok) {
              this.groceryScanCount++;
              this.showToast(`Added ${this.groceryItemForm.name || 'item'} to inventory`);
              this.fetchInventory(); // background refresh, no await
            } else {
              this.showToast('Failed to add item', 'error');
            }
          } catch {
            this.showToast('Failed to add item', 'error');
          }
          this.skipGroceryNewItem();
        },

        skipGroceryNewItem() {
          this.groceryNewItem = null;
          this.groceryScanPaused = false;
          this.groceryItemForm = { name: '', quantity: 1, unit: '', preferred_unit: '', location: '', expiration_date: '', low_threshold: 1, barcode: '' };
        },

        showToast(msg, style = '', badge = '') {
          clearTimeout(this._toastTimer);
          this.toast = msg;
          this.toastStyle = style;
          this.toastBadge = badge;
          this._toastTimer = setTimeout(() => { this.toast = ''; this.toastStyle = ''; this.toastBadge = ''; }, 2500);
        },

        // --- Inventory ---
        async fetchInventory() {
          const params = new URLSearchParams();
          if (this.inventorySearch) params.set('name', this.inventorySearch);
          if (this.inventoryLocation) params.set('location', this.inventoryLocation);
          const res = await fetch('/api/inventory/?' + params);
          this.inventoryItems = await res.json();
        },

        async fetchExpiring() {
          const res = await fetch('/api/inventory/expiring?days=7');
          this.expiringItems = await res.json();
        },

        openAddItem() {
          this.editingItem = null;
          this.itemForm = { name: '', quantity: 0, unit: '', preferred_unit: '', location: '', expiration_date: '', low_threshold: 1, barcode: '' };
          this.suggestions = [];
          this.showSuggestions = false;
          this.modal = 'item';
        },

        editItem(item) {
          this.suggestions = [];
          this.showSuggestions = false;
          this.editingItem = item;
          this.itemForm = { ...item, preferred_unit: item.preferred_unit || '' };
          this.modal = 'item';
        },

        async saveItem() {
          if (!this.itemForm.name) return;
          if (this.editingItem) {
            await fetch(`/api/inventory/${this.editingItem.id}`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.itemForm),
            });
            this.showToast('Item updated');
          } else {
            await fetch('/api/inventory/', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.itemForm),
            });
            this.showToast('Item added');
          }
          this.modal = null;
          await this.fetchInventory();
          await this.fetchExpiring();
        },

        async deleteItem(id) {
          if (!confirm('Delete this item?')) return;
          await fetch(`/api/inventory/${id}`, { method: 'DELETE' });
          await this.fetchInventory();
          this.showToast('Item deleted');
        },

        // --- Shopping ---
        async fetchShoppingList() {
          const res = await fetch('/api/shopping/?show_checked=true');
          this.shoppingItems = await res.json();
        },

        openAddShoppingItem() {
          this.shoppingForm = { name: '', quantity_needed: 1, unit: '' };
          this.modal = 'shopping';
        },

        async saveShoppingItem() {
          if (!this.shoppingForm.name) return;
          await fetch('/api/shopping/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(this.shoppingForm),
          });
          this.modal = null;
          await this.fetchShoppingList();
          this.showToast('Added to list');
        },

        async toggleShoppingItem(item) {
          await fetch(`/api/shopping/${item.id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ checked: !item.checked }),
          });
          await this.fetchShoppingList();
        },

        async deleteShoppingItem(id) {
          await fetch(`/api/shopping/${id}`, { method: 'DELETE' });
          await this.fetchShoppingList();
        },

        async clearCheckedItems() {
          await fetch('/api/shopping/checked', { method: 'DELETE' });
          await this.fetchShoppingList();
          this.showToast('Cleared checked items');
        },

        async generateFromThresholds() {
          const res = await fetch('/api/shopping/generate-from-thresholds', { method: 'POST' });
          const data = await res.json();
          await this.fetchShoppingList();
          this.showToast(`Added ${data.added} low-stock items`);
        },

        // --- Recipes ---
        async fetchRecipes() {
          const params = new URLSearchParams();
          if (this.recipeTagFilter) params.set('tag', this.recipeTagFilter);
          if (this.recipeAvailableOnly) params.set('available_only', 'true');
          const res = await fetch('/api/recipes/?' + params);
          this.recipes = await res.json();
        },

        openAddRecipe() {
          this.recipeForm = { name: '', description: '', instructions: '', tags: '', servings: 2, ingredients: [] };
          this.modal = 'recipe';
        },

        async saveRecipe() {
          if (!this.recipeForm.name) return;
          await fetch('/api/recipes/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(this.recipeForm),
          });
          this.modal = null;
          await this.fetchRecipes();
          this.showToast('Recipe saved');
        },

        viewRecipe(recipe) {
          this.selectedRecipe = recipe;
          this.modal = 'viewRecipe';
        },

        async addRecipeToShoppingList(recipe) {
          const res = await fetch(`/api/recipes/${recipe.id}/add-to-shopping-list`, { method: 'POST' });
          const data = await res.json();
          this.modal = null;
          this.showToast(`Added ${data.added} missing ingredient(s) to shopping list`);
          await this.fetchShoppingList();
        },

        async deleteRecipe(id) {
          if (!confirm('Delete this recipe?')) return;
          await fetch(`/api/recipes/${id}`, { method: 'DELETE' });
          await this.fetchRecipes();
          this.showToast('Recipe deleted');
        },

        // --- Calendar ---
        getMonday(d) {
          const day = d.getDay();
          const diff = d.getDate() - day + (day === 0 ? -6 : 1);
          const monday = new Date(d.setDate(diff));
          monday.setHours(0, 0, 0, 0);
          return monday;
        },

        get calendarWeekLabel() {
          if (!this.calendarWeekStart) return '';
          const end = new Date(this.calendarWeekStart);
          end.setDate(end.getDate() + 6);
          return this.calendarWeekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
            ' – ' + end.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        },

        get calendarDays() {
          if (!this.calendarWeekStart) return [];
          const days = [];
          for (let i = 0; i < 7; i++) {
            const d = new Date(this.calendarWeekStart);
            d.setDate(d.getDate() + i);
            days.push({
              date: d.toISOString().split('T')[0],
              label: d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' }),
            });
          }
          return days;
        },

        prevWeek() {
          const d = new Date(this.calendarWeekStart);
          d.setDate(d.getDate() - 7);
          this.calendarWeekStart = d;
          this.fetchCalendar();
        },

        nextWeek() {
          const d = new Date(this.calendarWeekStart);
          d.setDate(d.getDate() + 7);
          this.calendarWeekStart = d;
          this.fetchCalendar();
        },

        async fetchCalendar() {
          const start = this.calendarWeekStart.toISOString().split('T')[0];
          const res = await fetch(`/api/calendar/week?start=${start}`);
          this.calendarEntries = await res.json();
        },

        getCalendarEntry(date, slot) {
          return this.calendarEntries.find(e => e.date === date && e.meal_slot === slot) || null;
        },

        getRecipeName(recipeId) {
          const r = this.recipes.find(r => r.id === recipeId);
          return r ? r.name : 'Unknown';
        },

        openAddCalendarEntry(date, slot) {
          this.calendarEntryForm = { date, meal_slot: slot, recipe_id: '', servings: 1 };
          this.modal = 'calendarEntry';
        },

        async saveCalendarEntry() {
          if (!this.calendarEntryForm.recipe_id) return;
          await fetch('/api/calendar/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(this.calendarEntryForm),
          });
          this.modal = null;
          await this.fetchCalendar();
          this.showToast('Meal added');
        },

        async deleteCalendarEntry(id) {
          await fetch(`/api/calendar/${id}`, { method: 'DELETE' });
          await this.fetchCalendar();
          this.showToast('Meal removed');
        },

        async generateWeeklyShopping() {
          const start = this.calendarWeekStart.toISOString().split('T')[0];
          const res = await fetch(`/api/calendar/generate-weekly-shopping?start=${start}`, { method: 'POST' });
          const data = await res.json();
          this.showToast(`Added ${data.items.length} item(s) to shopping list`);
          await this.fetchShoppingList();
          this.activeTab = 'shopping';
        },
      };
    }
  </script>
</body>
</html>
